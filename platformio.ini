[platformio]
default_envs = uno_r4_minima

[env:uno_r4_minima]
platform = renesas-ra
board = uno_r4_minima
framework = arduino
monitor_speed = 115200
build_flags = -I boards
lib_deps =
    bakercp/PacketSerial @ ^1.4.0

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
build_flags = -I boards
lib_deps =
    bakercp/PacketSerial @ ^1.4.0
